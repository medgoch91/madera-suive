name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          port: 21
          protocol: ftps
          server-dir: ${{ secrets.HOSTINGER_FTP_PATH || '/domains/maderadeco.app/public_html/' }}
          # Only deploy the files that make up the static web app.
          # Explicitly exclude bot code, secrets, build artifacts, IDE state.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.claude-flow/**
            **/.swarm/**
            **/docs/**
            **/smart-purchase/**
            **/.DS_Store
            **/.env
            **/.env.*
            **/.mcp.json
            **/requirements.txt
            **/telegram_bot.py
            **/bot.log
            **/bot.log.*
            **/supabase_schema.sql
            **/supabase_schema.zip
            **/chat_ids.json
            **/CLAUDE.md
            **/README.md
